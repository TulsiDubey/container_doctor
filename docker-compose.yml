services:
  # --- INFRASTRUCTURE ---

  db:
    image: pgvector/pgvector:pg15
    container_name: db
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=tulsi1
      - POSTGRES_PASSWORD=Tulsi@2211
      - POSTGRES_DB=mydb
    networks:
      - doctor-net
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_LISTENERS: 'PLAINTEXT://kafka:29092,CONTROLLER://kafka:9093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      # Simple Base64 ID for KRaft
      CLUSTER_ID: 'MkU3RTFDRUI3QzY0NEZGM0'
    networks:
      - doctor-net
    healthcheck:
      # High-speed native bash port probe to bypass Java VM overhead
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/9092' || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 30
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.50'

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - doctor-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'

  # --- MONITORING SERVICES ---

  log_ingestor:
    build:
      context: .
      dockerfile: services/log_ingestor/Dockerfile
    container_name: log_ingestor
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - TARGET_CONTAINERS=web,api,db
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - doctor-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.25'

  incident_processor:
    build:
      context: .
      dockerfile: services/incident_processor/Dockerfile
    container_name: incident_processor
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - DATABASE_URL=postgresql://tulsi1:Tulsi%402211@db:5432/mydb
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OLLAMA_HOST=http://ollama:11434
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
    depends_on:
      - db
      - kafka
      - ollama
    networks:
      - doctor-net
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.50'

  dashboard_api:
    build:
      context: .
      dockerfile: services/dashboard_api/Dockerfile
    container_name: dashboard_api
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql://tulsi1:Tulsi%402211@db:5432/mydb
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - db
    networks:
      - doctor-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.25'

  # --- TEST APP SERVICES ---

  web:
    image: nginx:latest
    container_name: web
    ports:
      - "80:80"
    networks:
      - doctor-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 5s
      timeout: 2s
      retries: 2
    restart: unless-stopped

  api:
    build: ./api
    container_name: api
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://tulsi1:Tulsi%402211@db:5432/mydb
      - POOL_SIZE=20
    depends_on:
      - db
    networks:
      - doctor-net
    restart: unless-stopped

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: cloudflare_tunnel
    command: tunnel --url http://dashboard_api:8080
    networks:
      - doctor-net
    restart: always
    depends_on:
      - dashboard_api

networks:
  doctor-net:
    driver: bridge

volumes:
  db_data:
  ollama_data:
